<div class="page">

  <!-- Header -->
  <header class="top-bar">
    <h1>🚆 Train Reallocation System</h1>

    <div class="nav-actions">
      <button class="btn home" routerLink="/home">🏠 Home</button>
      <button class="btn dashboard" routerLink="/dashboard">📊 Dashboard</button>
      <button class="btn history" routerLink="/history">📜 History</button>
      <button class="btn logout" (click)="logout()">🔐 Logout</button>
    </div>
  </header>

  <!-- Passenger Details Card -->
  <div class="card">

    <h2>👤 Passenger Details</h2>

    <div class="form-group">
      <label>Passenger Name</label>
      <input type="text" [(ngModel)]="passengerData.Passenger_Name">
    </div>

    <div class="form-group">
      <label>Age</label>
      <input type="number" [(ngModel)]="passengerData.Age">
    </div>

    <div class="form-group">
      <label>Gender</label>
      <select [(ngModel)]="passengerData.Gender">
        <option value="">Select</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </div>

    <div class="form-group">
      <label>Journey Date</label>
      <input type="date" [(ngModel)]="passengerData.Journey_Date">
    </div>

    <button class="btn submit" (click)="continueBooking()">
      🎟 Continue to Seat Allocation
    </button>

  </div>
</div>
