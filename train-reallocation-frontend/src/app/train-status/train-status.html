<div class="page">

  <!-- Back link -->
  <div class="back-link">
    <a routerLink="/home">← Back to Trains</a>
  </div>

  <div class="card">

    <h2>Passenger Details</h2>

    <div class="form-group">
      <label>Passenger Name</label>
      <input type="text" [(ngModel)]="passengerData.Passenger_Name">
    </div>

    <div class="form-group">
      <label>Age</label>
      <input type="number" [(ngModel)]="passengerData.Age">
    </div>

    <div class="form-group">
      <label>Gender</label>
      <select [(ngModel)]="passengerData.Gender">
        <option value="">Select</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </div>

    <div class="form-group">
      <label>Journey Date</label>
      <input type="date" [(ngModel)]="passengerData.Journey_Date">
    </div>

    <button class="submit-btn" (click)="continueBooking()">
      Continue to Seat Allocation →
    </button>

  </div>

</div>
