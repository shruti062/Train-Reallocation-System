<h2>🚆 Available Trains</h2>

<input
  type="text"
  id="searchText"
  name="searchText"
  [(ngModel)]="searchText"
  placeholder="🔍 Search Train..."
  style="padding:8px; margin-bottom:15px; width:300px;">

<table border="1" width="100%">
  <tr>
    <th>Train No</th>
    <th>Train Name</th>
    <th>Type</th>
    <th>Source</th>
    <th>Destination</th>
    <th>Status</th>
    <th>Seats Available</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let train of filteredTrains">

    <td>{{train.TrainNo}}</td>
    <td>{{train.TrainName}}</td>
    <td>{{train.Train_Type}}</td>
    <td>{{train.Source}}</td>
    <td>{{train.Destination}}</td>
    <td>{{train.Train_Status}}</td>

    <td [style.color]="train.Seats_Available > 50 ? 'green' : 'red'">
      {{train.Seats_Available}}
    </td>

    <td>
      <button
        type="button"
        class="select-btn"
        (click)="selectTrain(train)">
        Select Train
      </button>
    </td>

  </tr>
</table>
